name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        if: ${{ hashFiles('backend/requirements.txt') != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        if: ${{ hashFiles('backend/requirements.txt') != '' }}
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run backend tests
        if: ${{ hashFiles('backend/requirements.txt') != '' }}
        run: python manage.py test

      - name: Regenerate OpenAPI schema
        if: ${{ hashFiles('backend/requirements.txt') != '' }}
        run: python manage.py spectacular --file openapi.yaml && git diff --exit-code -- openapi.yaml

      - name: Skip backend job when backend sources are unavailable
        if: ${{ hashFiles('backend/requirements.txt') == '' }}
        run: echo "Backend directory is unavailable in this checkout; skipping backend CI steps."
        working-directory: .

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test -- --runInBand

      - name: Build frontend
        run: npm run build